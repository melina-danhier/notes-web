spring:
  application:
    name: notes-service
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/notes}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:sergstop2004#}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    org:
      springframework:
        security: DEBUG