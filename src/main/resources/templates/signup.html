<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrieren</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/loginSignup.js"></script>
</head>
<body class="align-items-center">

<div class="con align-items-center animate">
    <h2>Konto erstellen</h2>
    <form id="signupForm" th:action="@{/signup}" method="post">
        <div>
            <i class="fa-solid fa-user"></i>
            <input type="text" id="name" name="name" placeholder="Vollständiger Name" size="30" required>
        </div>
        <div>
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="regEmail" name="email" placeholder="E-Mail Adresse" size="30" required>
        </div>
        <div>
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="regPassword" name="password" placeholder="Passwort" size="30" required>
            <i class="fa-solid fa-eye toggle-password" onclick="togglePassword()"></i>
        </div>
        <div>
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Passwort bestätigen" size="30" required>
            <i class="fa-solid fa-eye" onclick="togglePassword()"></i>
        </div>
        <button type="submit" class="btn btn-primary mt-2">Registrieren</button>
    </form>
    <p>Bereits ein Konto?
        <a th:href="@{/login}" class="link-primary">Hier einloggen</a>
    </p>
</div>

<script src="/js/loginSignup.js"></script>
</body>
</html>
