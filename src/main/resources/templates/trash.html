<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="icon" href="/favicon.ico" type="image/x-icon"/>
    <title>Papierkorb</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css"/>
    <link rel="stylesheet" href="/css/notes.css"/>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/trash.js" type="module"></script>
</head>
<body>

<div class="con">

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
        <h2 class="fs-4 fs-lg-2 mb-0">🗑️ Papierkorb</h2>

        <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary" th:href="@{/notes}">
                ← Zurück zu Notizen
            </a>
            <button class="btn btn-danger" id="emptyTrashBtn">
                Papierkorb leeren
            </button>
        </div>
    </div>

    <div class="center-gap m-3" th:if="${notes.content.isEmpty()}">
        <h5 class="fst-italic">Papierkorb ist leer</h5>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3" id="trashList" th:if="${notes != null}">
        <div class="col" th:each="note : ${notes.content}" th:id="'note-' + ${note.id}">
            <div class="card h-100 border-1 shadow-sm rounded-4 overflow-hidden">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="title m-0" th:text="${note.title}">Notiz</h5>

                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-success px-2 py-1"
                                title="Wiederherstellen"
                                th:onclick="'restoreNote(' + ${note.id} + ')'">
                            ♻️
                        </button>
                        <button class="btn btn-danger px-2 py-1"
                                title="Endgültig löschen"
                                th:onclick="'forceDeleteNote(' + ${note.id} + ')'">
                            ❌
                        </button>
                    </div>
                </div>

                <div class="card-body d-flex flex-column justify-content-between gap-2 p-3">
                    <div class="d-flex gap-2">
                        <span class="text-primary-emphasis bg-primary-subtle rounded-3 p-1"
                              th:if="${note.tags != null and #lists.size(note.tags) > 0}"
                              th:each="tag : ${note.tags}"
                              th:text="'#' + ${tag.tag}">
                        </span>
                    </div>

                    <div class="h-100">
                        <span class="content"
                              th:text="${note.content != null and note.content.length() > 0 ? #strings.abbreviate(note.content, 250) : ''}">
                            Inhalt
                        </span>
                    </div>

                    <div class="text-muted small d-flex flex-column">
                        <span th:if="${note.created != null}">
                            Erstellt: <span th:text="${#temporals.format(note.created, 'dd.MM.yyyy HH:mm')}"></span>
                        </span>
                        <span th:if="${note.updated != null}">
                            Zuletzt geändert: <span th:text="${#temporals.format(note.updated, 'dd.MM.yyyy HH:mm')}"></span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="center-gap justify-content-center mt-4" th:if="${totalPages > 1}">
        <a class="btn btn-outline-secondary"
           th:classappend="${currentPage == 0} ? 'disabled'"
           th:href="@{/notes/trash(pageNo=${currentPage - 1}, pageSize=${pageSize}, sortField=${sortField}, sortDir=${sortDir})}">
            ← Zurück
        </a>

        <a class="btn btn-outline-secondary"
           th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'"
           th:href="@{/notes/trash(pageNo=${currentPage + 1}, pageSize=${pageSize}, sortField=${sortField}, sortDir=${sortDir})}">
            Weiter →
        </a>
    </div>

</div>

</body>
</html>
