<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="min-vh-100 d-flex align-items-center justify-content-center p-4">

<div class="con bg-white p-5 rounded-5 shadow-lg d-flex flex-column align-items-center ">
    <h2>Willkommen</h2>
    <form id="loginForm" th:action="@{/login}" method="post"
          class="d-flex flex-column gap-3 my-4">
        <div>
            <i class="fa-solid fa-envelope me-2"></i>
            <input type="email" id="email" name="email" placeholder="E-Mail-Adresse" size="30" required>
        </div>
        <div>
            <i class="fa-solid fa-lock me-2"></i>
            <input type="password" id="password" name="password" placeholder="Passwort" size="30" required>
            <i class="fa-solid fa-eye" onclick="togglePassword()"></i>
        </div>
        <a th:href="@{/resetPassword}" class="text-end link-primary small">Passwort vergessen?</a>
        <button type="submit" class="btn btn-primary mt-2">Einloggen</button>
    </form>
    <p>Noch kein Konto?
        <a th:href="@{/signup}" class="link-primary">Jetzt registrieren</a>
    </p>
</div>

<script src="/js/script.js"></script>
</body>
</html>
