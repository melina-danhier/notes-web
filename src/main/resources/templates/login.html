<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/loginSignup.js"></script>
</head>
<body class="align-items-center">

<div class="con align-items-center animate">
    <h2 class="mt-1">Willkommen zurück</h2>

    <!-- Fehlerbehandlung -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Abmeldungs-Erfolg -->
    <div th:if="${logout}" class="alert alert-info alert-dismissible fade show" role="alert">
        <i class="fa-solid fa-circle-check"></i>
        <span th:text="${logout}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Registrierungs-Erfolg -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fa-solid fa-circle-check"></i>
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <form id="loginForm" th:action="@{/login}" method="post"
          class="d-flex flex-column gap-3 my-2">
        <div class="d-flex align-items-center border rounded-2 gap-2 px-2">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="email" name="email"
                   placeholder="E-Mail-Adresse" required
                   class="form-control border-0 shadow-none">
        </div>
        <div class="d-flex align-items-center border rounded-2 gap-2 px-2">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" name="password"
                   placeholder="Passwort" required
                   class="form-control border-0 shadow-none">
            <i class="fa-solid fa-eye" onclick="togglePassword()"></i>
        </div>
        <a th:href="@{/resetPassword}" class="text-end link-primary small">Passwort vergessen?</a>
        <button type="submit" class="btn btn-primary mt-2">Einloggen</button>
    </form>
    <p>Noch kein Konto?
        <a th:href="@{/signup}" class="link-primary">Jetzt registrieren</a>
    </p>
</div>

</body>
</html>
