<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>📝 Notizen</title>
    <link rel="stylesheet" href="/css/notes.css"/>
    <link rel="stylesheet" href="/css/style.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="min-vh-100 d-flex justify-content-center p-5">

<div class="con container bg-white p-5 flex-column shadow-lg">
    <header>
        <div class="d-flex justify-content-between">
            <h2 sec:authorize="isAuthenticated()" th:text="'Willkommen, ' + ${displayname} + '!'">Placeholder</h2>
            <form sec:authorize="isAuthenticated()"
                  th:action="@{/logout}"
                  method="post"
                  onsubmit="return confirm('Wirklich abmelden?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-danger">Logout</button>
            </form>
        </div>
    </header>

    <div class="d-flex justify-content-center mt-2">
        <button id="newNoteBtn" class="btn btn-primary px-4">➕ Neue Notiz</button>
    </div>

    <div th:if="${notes.isEmpty()}" class="container justify-content-center p-3 m-3">
        <h5 class="fst-italic">Keine Notizen vorhanden</h5>
    </div>

    <div id="notesList" th:if="${notes != null}"
         class="row g-3 m-3">
        <div th:each="note : ${notes}"
             class="col-md-4 col-sm-6 col-12"
             th:id="'note-' + ${note.id}">
            <div class="bg-light shadow-sm rounded-5 p-4">
                <div class="d-flex justify-content-between gap-3">
                    <h4 th:text="${note.title}">Notiz</h4>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-primary py-2 px-3"
                                th:onclick="'window.location.href=\'/notes/' + ${note.id} + '\'; event.stopPropagation();'"
                                title="Bearbeiten">
                            ✏️
                        </button>
                        <button class="btn btn-danger py-2 px-3"
                                th:onclick="'deleteNote(' + ${note.id} + '); event.stopPropagation();'"
                                title="Löschen">
                            🗑️
                        </button>
                    </div>
                </div>

                <!-- Tags oder "Keine Tags" -->
                <div class="my-3 d-flex gap-2 flex-wrap">
                    <span th:if="${note.tags != null and #lists.size(note.tags) > 0}"
                          th:each="tag : ${note.tags}"
                          th:text="'#' + ${tag.tag}"
                          class="small bg-primary-subtle p-2 rounded-3 text-primary-emphasis fw-medium">
                    </span>
                    <span th:if="${note.tags == null or #lists.size(note.tags) == 0}"
                          class="small bg-secondary-subtle p-2 rounded-3 text-muted fst-italic fw-medium">
                        Keine Tags
                    </span>
                </div>

                <!-- Genau eine Zeile Inhalt -->
                <div class="note-content overflow-hidden text-truncate py-2 px-1 border-bottom border-light">
                    <span th:text="${note.content != null and note.content.length() > 0
                       ? #strings.abbreviate(note.content, 200) : 'Kein Inhalt'}"
                          th:classappend="${note.content == null or note.content.length() == 0} ? 'no-content'"
                          class="small text-body-secondary">
                    </span>
                </div>

                <div class="d-flex flex-column small text-muted mt-2">
                    <span th:if="${note.created != null}">
                        Erstellt: <span th:text="${#temporals.format(note.created, 'dd.MM.yyyy HH:mm')}"/>
                    </span>
                    <span th:if="${note.updated != null}">
                        Zuletzt Geändert: <span th:text="${#temporals.format(note.updated, 'dd.MM.yyyy HH:mm')}"/>
                    </span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/js/notes.js"></script>
</body>
</html>
