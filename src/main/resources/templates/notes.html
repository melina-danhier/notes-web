<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>Notizen</title>
    <link rel="stylesheet" href="/css/notes.css"/>
</head>
<body>
<div class="container">
    <header>
        <div class="user-info">
            <h1 sec:authorize="isAuthenticated()" th:text="'Willkommen, ' + ${displayname} + '!'"></h1>
            <!-- FIX 1: Logout als FORM (CSRF-kompatibel) -->
            <form sec:authorize="isAuthenticated()"
                  th:action="@{/logout}"
                  method="post"
                  style="display: inline;"
                  onsubmit="return confirm('Wirklich abmelden?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout">Logout</button>
            </form>
            <button id="newNoteBtn" class="btn-primary">➕ Neue Notiz</button>
        </div>
    </header>

    <!-- Liste der Notizen -->
    <div id="notesList" class="notes-container" th:if="${notes != null}">
        <div th:each="note : ${notes}"
             class="note-card"
             th:id="'note-' + ${note.id}">
            <div class="note-header">
                <h3 th:text="${note.title}">Notiz</h3>
                <div class="note-actions">
                    <button class="btn-view"
                            th:onclick="'window.location.href=\'/notes/' + ${note.id} + '\'; event.stopPropagation();'">
                        👁️ Ansehen
                    </button>
                    <button class="btn-delete"
                            th:onclick="'deleteNote(' + ${note.id} + '); event.stopPropagation();'">
                        🗑️
                    </button>
                </div>
            </div>
            <div class="note-tags" th:if="${note.tags != null and #lists.size(note.tags) > 0}">
                <span th:each="tag : ${note.tags}" class="tag" th:text="'#' + ${tag.tag}"></span>
            </div>
            <p th:text="${note.content}">Inhalt...</p>
            <div class="note-meta">
                <span class="time" th:text="${note.created != null} ? ${#temporals.format(note.created, 'dd.MM.yyyy HH:mm')} : 'Gerade erstellt'"></span>
            </div>
        </div>
        <div th:if="${notes.isEmpty()}" class="empty-state">
            <div class="empty-icon">📝</div>
            <h3>Keine Notizen vorhanden</h3>
            <p>Klicke auf "Neue Notiz" um zu starten!</p>
        </div>
    </div>
</div>

<script src="/js/notes.js"></script>
</body>
</html>
