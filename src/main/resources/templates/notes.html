<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>📝 Notizen</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css"/>
    <link rel="stylesheet" href="/css/notes.css"/>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/notes.js" type="module"></script>
</head>
<body>

<div class="con w-100">
    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 sec:authorize="isAuthenticated()" th:text="'👋🏻 Hallo, ' + ${displayname} + '!'">Placeholder</h2>
        <div class="d-flex gap-3 align-items-center">
            <div>
                <button id="newNoteBtn" class="btn btn-primary">➕ Neue Notiz</button>
            </div>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-danger">Logout</button>
            </form>
        </div>
    </div>

    <!-- TAG FILTER DROPDOWN -->
    <div class="dropdown">
        <button class="btn btn-outline-primary dropdown-toggle" type="button"
                id="tagFilterBtn" data-bs-toggle="dropdown" aria-expanded="false">
            <span id="selectedTagDisplay">Alle Tags</span>
        </button>
        <ul class="dropdown-menu">
            <!-- "Alle Tags" Option  -->
            <li>
                <a class="dropdown-item fw-semibold tag-filter-item"
                data-tag-id="" data-tag-name="Alle Tags" href="javascript:void(0);">
                Alle Tags
                </a>
            </li>
            <li><hr class="dropdown-divider"></li>

            <!-- Dynamische Tags aus Thymeleaf -->
            <li th:each="tag : ${allTags}">
                <a class="dropdown-item tag-filter-item"
                   th:attr="data-tag-id=${tag.id}"
                   th:data-tag-name="'#' + ${tag.tag}"
                   th:text="'#' + ${tag.tag}"
                   href="javascript:void(0);">
                </a>
            </li>
        </ul>
    </div>

    <div th:if="${notes.isEmpty()}" class="container justify-content-center p-3 m-3">
        <h5 class="fst-italic">Keine Notizen vorhanden</h5>
    </div>

    <div id="notesList" th:if="${notes != null}" class="row g-4">
        <div th:each="note : ${notes}" th:id="'note-' + ${note.id}"
             class="col-lg-4 col-md-6 col-12">
            <div class="bg-light shadow-sm rounded-5 p-4">
                <div class="d-flex justify-content-between gap-3">
                    <h4 th:text="${note.title}">Notiz</h4>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-primary px-3" title="Bearbeiten"
                                th:onclick="'window.location.href=\'/notes/' + ${note.id} + '\'; event.stopPropagation();'">
                            ✏️
                        </button>
                        <button class="btn btn-danger px-3" title="Löschen"
                                th:onclick="'deleteNote(' + ${note.id} + '); event.stopPropagation();'">
                            🗑️
                        </button>
                    </div>
                </div>

                <div class="my-1 d-flex gap-2 flex-wrap">
                    <span th:if="${note.tags != null and #lists.size(note.tags) > 0}"
                          th:each="tag : ${note.tags}"
                          th:attr="data-tag-id=${tag.id}"
                          th:text="'#' + ${tag.tag}"
                          class="small bg-primary-subtle text-primary p-2 rounded-3">
                    </span>
                    <span th:if="${note.tags == null or #lists.size(note.tags) == 0}"
                          class="small bg-secondary-subtle p-2 rounded-3 no-content">
                        Keine Tags
                    </span>
                </div>

                <div class="py-2">
                    <span th:text="${note.content != null and note.content.length() > 0 ? #strings.abbreviate(note.content, 250) : 'Kein Inhalt'}"
                          th:classappend="${note.content == null or note.content.length() == 0} ? 'no-content'"
                          class="p-2">Inhalt
                    </span>
                </div>

                <div class="d-flex flex-column small text-muted mt-2">
                    <span th:if="${note.created != null}" class="local-time">
                        Erstellt: <span th:text="${#temporals.format(note.created, 'dd.MM.yyyy HH:mm')}"></span>
                    </span>
                    <span th:if="${note.updated != null}" class="local-time">
                        Zuletzt geändert: <span th:text="${#temporals.format(note.updated, 'dd.MM.yyyy HH:mm')}"></span>
                    </span>
                </div>

            </div>
        </div>
    </div>
</div>

</body>
</html>
