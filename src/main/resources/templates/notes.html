<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="icon" href="/favicon.ico" type="image/x-icon"/>
    <title>Notizen</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css"/>
    <link rel="stylesheet" href="/css/notes.css"/>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/notes.js" type="module"></script>
</head>
<body>

<div class="con w-100">

    <!-- HEADER -->
    <div class="center-gap justify-content-between">
        <h2 sec:authorize="isAuthenticated()" th:text="'👋🏻 Hallo, ' + ${displayname} + '!'">Placeholder</h2>
        <div class="center-gap">
            <!-- TAG FILTER DROPDOWN -->
            <div class="dropdown">
                <button class="btn btn-outline-primary dropdown-toggle" type="button"
                        id="tagFilterBtn" data-bs-toggle="dropdown" aria-expanded="false">
                    <span id="selectedTagDisplay" th:text="${tagFilter != null and tagFilter != ''} ? '#' + ${tagFilter} : 'Alle Tags'">Alle Tags</span>
                </button>
                <ul class="dropdown-menu">
                    <!-- "Alle Tags" Option  -->
                    <li>
                        <a class="dropdown-item fw-semibold tag-filter-item"
                           th:classappend="${tagFilter == null or tagFilter == ''} ? 'active-tag-filter'"
                           data-tag-id="" data-tag-value="" data-tag-name="Alle Tags" href="#">
                            Alle Tags
                        </a>
                    </li>
                    <li><hr class="dropdown-divider"></li>

                    <!-- Dynamische Tags aus Thymeleaf -->
                    <li th:each="tag : ${allTags}">
                        <a class="dropdown-item tag-filter-item"
                           th:classappend="${tagFilter != null and tagFilter == tag.tag} ? 'active-tag-filter'"
                           th:attr="data-tag-id=${tag.id}"
                           th:data-tag-value="${tag.tag}"
                           th:data-tag-name="'#' + ${tag.tag}" th:text="'#' + ${tag.tag}" href="#">
                        </a>
                    </li>
                </ul>
            </div>
            <!-- SEARCHING -->
            <div class="input-group">
                <input class="form-control" type="text" id="searchInput" placeholder="Suche in Notizen..." autocomplete="off"
                       th:value="${search}">
            </div>
            <!-- SORTING -->
            <div class="dropdown">
                <button class="btn btn-outline-secondary dropdown-toggle" type="button"
                        data-bs-toggle="dropdown" id="sortBtn">
                    <span id="selectedSortDisplay">Erstellt ↓</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end" id="sortMenu">
                    <li><a class="dropdown-item active" href="#"
                           data-sort-field="created" data-sort-dir="desc">Erstellt ↓</a></li>
                    <li><a class="dropdown-item" href="#"
                           data-sort-field="updated" data-sort-dir="desc">Geändert ↓</a></li>
                    <li><a class="dropdown-item" href="#"
                           data-sort-field="title" data-sort-dir="asc">Titel ↑</a></li>
                </ul>
            </div>
        </div>
        <div class="center-gap">
            <button class="btn btn-primary" id="newNoteBtn">➕ Neue Notiz</button>
            <form class="m-0"
                  sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-danger">Logout</button>
            </form>
        </div>
    </div>

    <!-- NO NOTES -->
    <div class="center-gap m-3" th:if="${notes.content.isEmpty()}">
        <h5 class="fst-italic">Keine Notizen vorhanden</h5>
    </div>

    <!-- NOTE-LIST -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="notesList" th:if="${notes != null}">
        <div class="col" th:each="note : ${notes.content}" th:id="'note-' + ${note.id}">
            <div class="card h-100 border-1 shadow-sm rounded-4 overflow-hidden">
                <!-- HEADER - Title, Tool buttons -->
                <div class="card-header d-flex justify-content-between align-items-center">
                    <!-- TITLE -->
                    <h5 class="title m-0" th:text="${note.title}">Notiz</h5>
                    <!-- TOOL BUTTONS -->
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-primary px-3 py-1" title="Bearbeiten"
                                th:onclick="'window.location.href=\'/notes/' + ${note.id} + '\'; event.stopPropagation();'">
                            ✏️
                        </button>
                        <button class="btn btn-danger px-3 py-1" title="Löschen"
                                th:onclick="'deleteNote(' + ${note.id} + '); event.stopPropagation();'">
                            🗑️
                        </button>
                    </div>
                </div>
                <div class="card-body d-flex flex-column justify-content-between gap-2 p-3">
                    <!-- TAGS -->
                    <div class="d-flex gap-2">
                        <span class="text-primary-emphasis bg-primary-subtle rounded-3 p-1"
                              th:if="${note.tags != null and #lists.size(note.tags) > 0}"
                              th:each="tag : ${note.tags}"
                              th:attr="data-tag-id=${tag.id}"
                              th:text="'#' + ${tag.tag}">
                        </span>
                    </div>

                    <!-- CONTENT -->
                    <div class="h-100">
                        <span th:text="${note.content != null and note.content.length() > 0 ? #strings.abbreviate(note.content, 250) : ''}"
                              class="content">Inhalt
                        </span>
                    </div>

                    <!-- DETAILS - Erstelldatum und Änderungsdatum -->
                    <div class="text-muted small d-flex flex-column">
                        <span class="local-time" th:if="${note.created != null}">
                            Erstellt: <span th:text="${#temporals.format(note.created, 'dd.MM.yyyy HH:mm')}"></span>
                        </span>
                        <span class="local-time" th:if="${note.updated != null}">
                            Zuletzt geändert: <span th:text="${#temporals.format(note.updated, 'dd.MM.yyyy HH:mm')}"></span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- PAGINATION -->
    <div class="center-gap justify-content-center mt-4" th:if="${totalPages > 1}">
        <a class="btn btn-outline-secondary"
           th:classappend="${currentPage == 0} ? 'disabled'"
           th:href="@{/notes(pageNo=${currentPage - 1}, pageSize=${pageSize}, sortField=${sortField}, sortDir=${sortDir}, tagFilter=${tagFilter}, search=${search})}">
            ← Zurück
        </a>

        <a class="btn btn-outline-secondary"
           th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'"
           th:href="@{/notes(pageNo=${currentPage + 1}, pageSize=${pageSize}, sortField=${sortField}, sortDir=${sortDir}, tagFilter=${tagFilter}, search=${search})}">
            Weiter →
        </a>
    </div>

</div>

</body>
</html>
