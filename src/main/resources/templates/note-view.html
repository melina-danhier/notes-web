<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${noteDto?.title ?: 'Neue Notiz'}">Notiz</title>
    <link rel="stylesheet" href="/css/notes.css"/>
</head>
<body>
<div class="container">

    <!-- Formular für Create UND Edit -->
    <form class="note-form" th:object="${noteDto}">
        <input type="hidden" id="noteIdInput" th:field="*{id}" name="id">
        <div class="form-row">
            <div class="input-group">
                <label for="titleInput">Titel *</label>
                <input type="text" id="titleInput" th:field="*{title}" placeholder="Titel der Notiz" required>
            </div>
            <div class="input-group">
                <label for="tagsInput">Tags</label>
                <input type="text" id="tagsInput" th:field="*{tagsRaw}" placeholder="Arbeit, Wichtig, privat">
            </div>
        </div>
        <div class="input-group full-width">
            <label for="contentInput">Inhalt</label>
            <textarea id="contentInput" th:field="*{content}" placeholder="Inhalt der Notiz" rows="8"></textarea>
        </div>
        <div class="form-actions">
            <button type="button" id="saveBtn" class="btn-primary">
                <span th:text="${noteDto?.id} ? '💾 Speichern' : '➕ Neue Notiz erstellen'">Speichern</span>
            </button>
            <button type="button" id="deleteBtn" class="btn-danger"
                    th:unless="${noteDto?.id == null}"
                    onclick="deleteNote()">🗑️ Löschen</button>
            <button type="button" class="btn-secondary" onclick="window.location.href='/notes'">Abbrechen</button>
        </div>
    </form>
</div>

<script src="/js/note-view.js"></script>
</body>
</html>
