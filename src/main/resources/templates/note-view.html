<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${noteDto?.title ?: 'Neue Notiz'}">Notiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css"/>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/note-view.js"></script>
</head>
<body class="align-items-center">

<div class="con">
    <h3 th:text="${noteDto?.id} ? '✏️ Notiz bearbeiten' : '➕ Notiz erstellen'" class="text-center">Notiz erstellen oder bearbeiten</h3>
    <form th:object="${noteDto}" class="d-flex flex-column gap-2 w-100 mt-0">
        <input type="hidden" id="noteIdInput" th:field="*{id}" name="id">
        <input type="text" id="titleInput" th:field="*{title}" placeholder="Titel der Notiz" autofocus required
               class="form-control">
        <input type="text" id="tagsInput" th:field="*{tagsRaw}" placeholder="Tag1, Tag2, ..."
               class="form-control">
        <textarea id="contentInput" th:field="*{content}" placeholder="Inhalt der Notiz..." rows="8"
                  class="form-control" style="resize: vertical;"></textarea>
        <div class="d-flex flex-wrap gap-2 mt-2">
            <button type="button" id="saveBtn" class="btn btn-success">💾 Speichern</button>
            <button type="button" class="btn btn-secondary" onclick="window.location.href='/notes'">Abbrechen</button>
        </div>
    </form>
</div>

</body>
</html>
