<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${noteDto?.title ?: 'Neue Notiz'}">Notiz</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css"/>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/note-view.js"></script>
</head>
<body class="align-items-center">

<div class="con align-items-center">
    <h3 th:text="${noteDto?.id} ? '✏️ Notiz bearbeiten' : '➕ Notiz erstellen'">Notiz erstellen oder bearbeiten</h3>
    <form th:object="${noteDto}">
        <input type="hidden" id="noteIdInput" th:field="*{id}" name="id">
        <input type="text" id="titleInput" th:field="*{title}" placeholder="Titel der Notiz" size="30" required>
        <input class="col" type="text" id="tagsInput" th:field="*{tagsRaw}" placeholder="Tag1, Tag2, ..." size="30">
        <textarea class="col" id="contentInput" th:field="*{content}" placeholder="Inhalt der Notiz..." rows="7" cols="30"></textarea>
        <div class="mt-2">
            <button type="button" id="saveBtn" class="btn btn-success">💾 Speichern</button>
            <button type="button" class="btn btn-secondary" onclick="window.location.href='/notes'">Abbrechen</button>
        </div>
    </form>
</div>

</body>
</html>
