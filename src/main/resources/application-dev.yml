spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/notes
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: false

  flyway:
    validate-on-migrate: true

logging:
  level:
    root: INFO
    com.deinpackage: DEBUG